<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sQuizz - The Ultimate Pub Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Arvo:wght@400;700&family=VT323&family=Outfit:wght@300;400;700;900&family=Pacifico&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --pub-wood: #1a0f08;
            --pub-accent: #f59e0b;
            --pub-paper: #fdf6e3;
        }

        /* --- THEMES --- */
        body.theme-normal {
            background-color: var(--pub-wood);
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://www.transparenttextures.com/patterns/dark-wood.png');
            color: #f8fafc;
            font-family: 'Arvo', serif;
        }

        .theme-normal .chalk-card {
            background: rgba(30, 41, 59, 0.9);
            border: 6px solid #475569;
            background-image: url('https://www.transparenttextures.com/patterns/black-linen.png');
            box-shadow: 15px 15px 30px rgba(0, 0, 0, 0.7);
            border-radius: 20px;
        }

        .theme-normal .paper-note {
            background: #fffef0;
            color: #1a1a1a;
            border: 2px solid #d1d5db;
            clip-path: polygon(1% 2%, 99% 1%, 97% 98%, 2% 96%);
            transform: rotate(var(--rotation));
            font-weight: 700;
        }

        .theme-normal .paper-note.active-choice {
            background: #fde047 !important;
            border: 4px solid #b45309 !important;
            transform: scale(1.15) rotate(0deg) !important;
            z-index: 50;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
        }

        body.theme-c64 {
            background-color: #0000aa;
            color: #ffffff;
            font-family: 'VT323', monospace;
            text-transform: uppercase;
        }

        .theme-c64 .chalk-card {
            background: #5555ff;
            border: 10px double #ffffff;
            box-shadow: 15px 15px 0px #000;
        }

        .theme-c64 .paper-note {
            background: #0000aa;
            color: #fff;
            border: 4px solid #fff;
            transform: none !important;
            box-shadow: 8px 8px 0px #000;
            clip-path: none;
            font-size: 1.5rem;
        }

        .theme-c64 .paper-note.active-choice {
            background: #ffffff !important;
            color: #0000aa !important;
            border: 6px solid #000 !important;
            transform: scale(1.1) !important;
        }

        body.theme-lsd {
            background: #000;
            animation: lsd-pulse 5s infinite linear;
            font-family: 'Permanent Marker', cursive;
        }

        @keyframes lsd-pulse {
            0% { background: #f0f; filter: hue-rotate(0deg); }
            50% { background: #0ff; filter: hue-rotate(180deg); }
            100% { background: #f0f; filter: hue-rotate(360deg); }
        }

        .theme-lsd .paper-note {
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            border: 5px solid #f0f;
            animation: glow-lsd 1s infinite alternate;
            transform: skew(-5deg) !important;
        }

        .theme-lsd .paper-note.active-choice {
            background: #fff !important;
            color: #000 !important;
            box-shadow: 0 0 100px #fff !important;
            transform: scale(1.2) rotate(0deg) !important;
        }

        body.theme-urban {
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            color: #e2e8f0;
            font-family: 'Outfit', sans-serif;
        }

        .theme-urban .chalk-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
            border-radius: 0;
        }

        .marker {
            font-family: 'Permanent Marker', cursive;
        }

        .race-horse {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            transition: left 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 20;
        }

        .race-horse img {
            width: 60px;
            height: 60px;
            border: 4px solid white;
            border-radius: 50%;
            background: #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .tally-box {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
            min-height: 30px;
        }

        .tally-group {
            display: flex;
            position: relative;
            padding: 0 4px;
        }

        .tally-mark {
            width: 6px;
            height: 28px;
            border-radius: 2px;
            display: inline-block;
            margin-right: 3px;
        }

        .tally-green { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .tally-red { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .tally-shield { background: #3b82f6; box-shadow: 0 0 8px #3b82f6; }

        .tally-cross {
            position: absolute;
            top: 50%;
            left: -2px;
            width: calc(100% + 4px);
            height: 4px;
            background: #000;
            transform: translateY(-50%) rotate(-45deg);
            border-radius: 2px;
            z-index: 5;
            box-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .avatar-option {
            transition: all 0.2s;
            border: 4px solid transparent;
        }
        .avatar-option.selected {
            border-color: var(--pub-accent);
            background: rgba(245, 158, 11, 0.2);
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--pub-accent);
        }

        .receipt-paper {
            background: #f8fafc;
            color: #0f172a;
            padding: 40px;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.5);
            border-radius: 2px;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
            font-size: 1.2rem;
            position: relative;
        }

        .cat-chip {
            padding: 10px 18px;
            border-radius: 99px;
            font-size: 14px;
            font-weight: 700;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            cursor: pointer;
        }

        .cat-chip.selected {
            background: var(--pub-accent);
            border-color: #fff;
            box-shadow: 0 0 20px var(--pub-accent);
            color: #000;
            transform: scale(1.1);
        }

        /* --- POWER-UPS --- */
        .powerup-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .powerup-btn.active {
            filter: grayscale(0);
            opacity: 1;
            cursor: pointer;
            border-color: #fff;
        }
        .powerup-btn:not(.active) {
            filter: grayscale(1);
            opacity: 0.3;
            cursor: not-allowed;
        }
        .powerup-btn.used {
            background: #000;
            border-color: #333;
        }

        #question-image {
            max-height: 450px;
            width: auto;
            border: 8px solid white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .sidebar-title {
            font-family: 'Pacifico', cursive;
            background: linear-gradient(45deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .animate-throw {
            animation: throwOut 0.8s forwards ease-in;
            pointer-events: none;
        }

        @keyframes throwOut {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(600px, -400px) rotate(720deg); opacity: 0; }
        }
    </style>
</head>

<body class="theme-normal min-h-screen flex flex-col lg:flex-row overflow-x-hidden transition-all duration-700">

    <div id="emoji-display"
        class="fixed inset-0 bg-black/80 flex flex-col items-center justify-center z-[1500] opacity-0 pointer-events-none transition-opacity duration-300">
        <p id="emoji-sender" class="text-xs text-white mb-2 uppercase font-sans tracking-widest"></p>
        <span id="emoji-icon" class="text-9xl drop-shadow-2xl"></span>
    </div>

    <main class="w-full lg:w-2/3 p-4 lg:p-8 flex flex-col items-center overflow-y-auto min-h-screen">
        <header class="text-center mb-10 mt-4 relative">
            <div class="absolute -top-10 left-1/2 -translate-x-1/2 text-white/5 text-[15rem] font-black select-none pointer-events-none">SQ</div>
            <h1 class="text-9xl marker text-orange-500 drop-shadow-[0_10px_10px_rgba(0,0,0,0.8)] italic font-black tracking-tighter">sQuizz</h1>
            <div class="flex items-center justify-center gap-4 mt-2">
                <div class="h-[2px] w-12 bg-orange-500/50"></div>
                <p id="room-status" class="text-xs uppercase tracking-[0.4em] text-white opacity-80 font-bold">Premium Pub Experience</p>
                <div class="h-[2px] w-12 bg-orange-500/50"></div>
            </div>
        </header>

        <div id="race-container" class="w-full max-w-4xl mb-8 hidden">
            <div class="turf-track h-[70px] relative rounded-lg shadow-2xl bg-[#22543d] border-4 border-[#1a3a3a] overflow-hidden"
                style="background-image: repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,255,255,0.15) 50px);">
                <div id="race-lane" class="w-full h-full relative px-10"></div>
            </div>
        </div>

        <div id="screen-lobby" class="w-full max-w-md space-y-6">
            <div class="chalk-card p-8 rounded-xl">
                <input type="text" id="username" placeholder="Name..."
                    class="w-full bg-black/40 p-4 rounded-lg border border-white/10 text-3xl focus:border-orange-800 outline-none text-center font-bold mb-6">
                <div id="avatar-grid" class="flex justify-center flex-wrap gap-2 mb-6"></div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="startHost()"
                        class="bg-orange-800 text-white py-4 rounded-xl font-bold uppercase shadow-lg">Host</button>
                    <button onclick="document.getElementById('join-box').classList.toggle('hidden')"
                        class="bg-zinc-800 py-4 rounded-xl font-bold uppercase">Join</button>
                </div>
                <div id="join-box" class="hidden mt-6 pt-6 border-t border-white/10 space-y-4">
                    <input type="text" id="join-id" placeholder="Code..."
                        class="w-full bg-black/20 p-3 rounded-xl border border-gray-700 text-center font-mono">
                    <button onclick="joinGame()"
                        class="w-full bg-emerald-800 py-3 rounded-xl font-bold uppercase">Connect</button>
                </div>
            </div>

            <div id="host-config" class="hidden chalk-card p-8 rounded-xl text-center">
                <div onclick="copyRoomId()"
                    class="bg-black/20 p-4 rounded-xl mb-6 cursor-pointer border border-white/10 text-white">
                    <span id="display-id" class="text-4xl font-mono font-bold tracking-tighter">...</span>
                </div>

                <div class="mb-6">
                    <p class="text-[10px] uppercase font-bold text-orange-500 mb-3 tracking-widest italic text-left ml-2">Themen-Mix:</p>
                    <div id="category-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <select id="cfg-count" class="bg-black border border-white/10 rounded-lg p-3 text-white">
                        <option value="3">3 FRAGEN</option>
                        <option value="5" selected>5 FRAGEN</option>
                        <option value="10">10 FRAGEN</option>
                    </select>
                    <select id="cfg-diff"
                        class="bg-black border border-white/10 rounded-lg p-3 text-orange-500 font-bold uppercase">
                        <option value="medium">ATZE</option>
                        <option value="hard">LEGENDE</option>
                    </select>
                </div>
                <button onclick="initiateQuiz()"
                    class="bg-orange-800 w-full py-6 rounded-2xl text-3xl font-black uppercase italic shadow-2xl">ZÜNDEN! 🍻</button>
            </div>
        </div>

        <div id="screen-quiz" class="hidden w-full max-w-4xl">
            <div id="quiz-progress" class="marker text-orange-600 text-3xl italic mb-6 px-4">...</div>
            <div class="text-center px-4">
                <div id="image-container" class="mb-8 hidden flex justify-center">
                    <img id="question-image" referrerpolicy="no-referrer"
                        class="mx-auto rounded-xl border-4 border-white shadow-2xl bg-white p-2 object-contain"
                        src="">
                </div>
                <h2 id="question-text"
                    class="text-3xl lg:text-5xl font-bold mb-12 text-white leading-tight drop-shadow-lg">...</h2>
                <div id="mc-area" class="grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
            </div>

            <div id="resolution"
                class="hidden mt-10 p-10 chalk-card rounded-[2rem] text-center relative overflow-hidden transition-all">
                <p id="personal-feedback" class="text-2xl font-bold mb-4 uppercase"></p>
                <h3 id="correct-text"
                    class="text-4xl lg:text-6xl font-black text-white mb-8 italic underline decoration-orange-700"></h3>
                <p id="sauf-text" class="text-xl text-yellow-500 font-bold mb-10 italic"></p>
                <button id="host-next" onclick="nextRound()"
                    class="hidden bg-white text-black px-16 py-4 rounded-xl font-black text-xl uppercase shadow-2xl mx-auto block hover:scale-105 transition">Nächste Runde ➔</button>
            </div>
        </div>

        <div id="screen-results" class="hidden w-full max-w-2xl pb-20">
            <h2 class="text-7xl marker text-orange-800 mb-10 text-center italic">ABRECHNUNG!</h2>
            <div id="podium" class="space-y-4 mb-16"></div>
            <div class="receipt-paper">
                <h3 class="text-xl font-bold mb-6 text-center border-b-2 border-black pb-2 uppercase text-black">SÜNDENREGISTER</h3>
                <div id="summary-table" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <aside class="w-full lg:w-1/3 bg-[#1e293b]/90 p-8 flex flex-col border-t lg:border-t-0 lg:border-l-8 border-orange-500/30 backdrop-blur-xl relative shadow-[0_0_100px_rgba(0,0,0,0.8)]">
        <div class="absolute top-0 right-0 w-32 h-32 opacity-20 pointer-events-none transform translate-x-10 -translate-y-10">
            <img src="https://www.transparentpng.com/download/beer-mug/beer-mug-transparent-background-5.png" class="w-full">
        </div>
        
        <div class="mb-10 p-6 chalk-card rounded-2xl relative z-10">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setTheme('theme-urban')" class="bg-zinc-700 py-2 rounded text-[10px] font-bold uppercase border border-cyan-400 col-span-2">Urban</button>
                <button onclick="setTheme('theme-normal')" class="bg-zinc-800 py-2 rounded text-[10px] font-bold uppercase">Pub</button>
                <button onclick="setTheme('theme-c64')" class="bg-blue-800 py-2 rounded text-[10px] font-bold uppercase">C64</button>
                <button onclick="setTheme('theme-lsd')" class="bg-gradient-to-r from-purple-500 to-pink-500 py-2 rounded text-[10px] font-bold uppercase col-span-2">LSD</button>
            </div>
        </div>
        <h3 class="text-4xl sidebar-title mb-6 text-center italic">Stammtisch</h3>
        <p id="ready-count" class="text-center text-xs opacity-60 mb-8 font-mono tracking-widest uppercase">0/0 BEREIT</p>
        <div id="player-list" class="flex-grow space-y-4 overflow-y-auto pr-2 custom-scrollbar"></div>
        <div class="mt-6 pt-6 border-t border-white/10 grid grid-cols-5 gap-2">
            <button onclick="sendEmoji('🍻')" class="text-2xl hover:scale-125 transition">🍻</button>
            <button onclick="sendEmoji('🥃')" class="text-2xl hover:scale-125 transition">🥃</button>
            <button onclick="sendEmoji('⚽')" class="text-2xl hover:scale-125 transition">⚽</button>
            <button onclick="sendEmoji('🤮')" class="text-2xl hover:scale-125 transition">🤮</button>
            <button onclick="sendEmoji('💩')" class="text-2xl hover:scale-125 transition">💩</button>
            <button onclick="sendEmoji('🏆')" class="text-2xl hover:scale-125 transition">🏆</button>
            <button onclick="sendEmoji('🥨')" class="text-2xl hover:scale-125 transition">🥨</button>
            <button onclick="sendEmoji('🚬')" class="text-2xl hover:scale-125 transition">🚬</button>
            <button onclick="sendEmoji('🔥')" class="text-2xl hover:scale-125 transition">🔥</button>
            <button onclick="sendEmoji('🤡')" class="text-2xl hover:scale-125 transition">🤡</button>
        </div>
    </aside>

    <script>
        let peer, myId, myName, myAvatarIdx = 0, connections = [], isHost = false;
        let gameState = { players: {}, questions: [], currentIndex: 0, status: 'LOBBY', showResolution: false, history: [], isLoading: false, saufText: "" };

        const TRIVIA_CATS = [
            { id: 9, name: "Gemischt" }, { id: 11, name: "Film" }, { id: 12, name: "Musik" },
            { id: 15, name: "Games" }, { id: 17, name: "Natur" }, { id: 18, name: "Computer" },
            { id: 21, name: "Sport" }, { id: 23, name: "Historie" }, { id: 24, name: "Politik" }, { id: 26, name: "Promis" }
        ];
        let selectedCats = [9];

        function setTheme(theme) { document.body.className = theme + ' min-h-screen flex flex-col lg:flex-row overflow-x-hidden transition-all duration-700'; localStorage.setItem('jizzquiz_theme', theme); }
        setTheme(localStorage.getItem('jizzquiz_theme') || 'theme-normal');

        function proxify(url) { return url ? `https://images.weserv.nl/?url=${encodeURIComponent(url.replace(/^https?:\/\//, ''))}&w=800&output=png` : ''; }

        async function translateText(text) {
            if (!text) return "";
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=de&dt=t&q=${encodeURIComponent(text)}`);
                const data = await res.json(); 
                return data[0].map(x => x[0]).join('') || text;
            } catch (e) { return text; }
        }

        const AVATAR_SEEDS = ['Abe', 'Buster', 'Clyde', 'Zack', 'Fritz', 'Hulk', 'Bier', 'Pferd'];
        const avatarGrid = document.getElementById('avatar-grid');
        AVATAR_SEEDS.forEach((seed, idx) => {
            const img = document.createElement('img'); img.src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${seed}`;
            img.className = `avatar-option p-2 bg-white/5 w-[60px] h-[60px] cursor-pointer rounded-xl ${idx === 0 ? 'selected' : ''}`;
            img.onclick = () => { document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected')); img.classList.add('selected'); myAvatarIdx = idx; };
            avatarGrid.appendChild(img);
        });

        const catGrid = document.getElementById('category-grid');
        TRIVIA_CATS.forEach(cat => {
            const chip = document.createElement('div'); chip.className = `cat-chip ${cat.id === 9 ? 'selected' : ''}`;
            chip.innerText = cat.name;
            chip.onclick = () => {
                if (cat.id === 9) { selectedCats = [9]; document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected')); chip.classList.add('selected'); return; }
                const idx = selectedCats.indexOf(cat.id);
                if (idx > -1) { selectedCats.splice(idx, 1); chip.classList.remove('selected'); }
                else { selectedCats.push(cat.id); chip.classList.add('selected'); document.querySelector('.cat-chip').classList.remove('selected'); const gIdx = selectedCats.indexOf(9); if (gIdx > -1) selectedCats.splice(gIdx, 1); }
                if (selectedCats.length === 0) { selectedCats = [9]; document.querySelector('.cat-chip').classList.add('selected'); }
            };
            catGrid.appendChild(chip);
        });

        function init() {
            peer = new Peer();
            peer.on('open', id => { myId = id; document.getElementById('display-id').innerText = id; });
            peer.on('connection', c => { 
                c.on('open', () => { 
                    connections.push(c); 
                    c.on('data', d => handleData(d, c)); 
                    c.on('close', () => { connections = connections.filter(conn => conn !== c); });
                }); 
            });
            peer.on('error', err => console.error("PeerJS Error:", err));
        }

        function startHost() {
            myName = document.getElementById('username').value.trim() || "Host"; isHost = true;
            document.getElementById('host-config').classList.remove('hidden');
            gameState.players[myId] = { name: myName, avatar: AVATAR_SEEDS[myAvatarIdx], score: 0, lastPoints: 0, ready: false, tally: [] }; 
            sync();
        }

        function joinGame() {
            myName = document.getElementById('username').value.trim() || "Gast";
            const hId = document.getElementById('join-id').value.trim(); const c = peer.connect(hId);
            c.on('open', () => { connections.push(c); c.send({ type: 'JOIN', name: myName, avatar: AVATAR_SEEDS[myAvatarIdx] }); });
            c.on('data', handleData);
        }

        function handleData(data, conn) {
            if (data.type === 'JOIN') { 
                gameState.players[conn.peer] = { name: data.name, avatar: data.avatar, score: 0, lastPoints: 0, ready: false, tally: [] }; 
                sync(); 
            }
            if (data.type === 'SYNC') { gameState = data.state; updateUI(); }
            if (data.type === 'SUBMIT') { const p = gameState.players[conn.peer]; if(p) { p.ready = true; p.lastChoice = data.choice; checkAllReady(); } }
            if (data.type === 'REACTION') triggerEmoji(data.from, data.emoji);
        }

        function checkAllReady() {
            if (!isHost) return;
            const all = Object.entries(gameState.players);
            if (all.every(([id, p]) => p.ready)) {
                const q = gameState.questions[gameState.currentIndex];
                let roundsCorrect = 0;
                all.forEach(([id, p]) => {
                    const pInput = (p.lastChoice || "").toString().trim().toUpperCase();
                    let isCorrect = false;
                    if (Array.isArray(q.correct_answer)) {
                        isCorrect = q.correct_answer.some(a => a.toUpperCase() === pInput);
                    } else {
                        isCorrect = pInput === q.correct_answer.toUpperCase();
                    }
                    
                    p.lastPoints = isCorrect ? 100 : 0; p.score += p.lastPoints;
                    p.tally.push(isCorrect ? 'green' : 'red');
                    if (isCorrect) roundsCorrect++;
                });
                gameState.saufText = roundsCorrect === 0 ? "TOTALAUSFALL! Alle bechern!" : (roundsCorrect === 1 ? "STREBER! Rest trinkt!" : "Puh, Safe.");
                gameState.history.push({ q: q.question, ans: q.correct_answer, players: JSON.parse(JSON.stringify(gameState.players)) });
                gameState.showResolution = true;
            }
            sync();
        }

        function sync() { if (!isHost) return; updateUI(); connections.forEach(c => c.send({ type: 'SYNC', state: gameState })); }

        function updateUI() {
            const maxScore = Math.max(...Object.values(gameState.players).map(p => p.score), 1);
            const leaderId = Object.keys(gameState.players).reduce((a, b) => gameState.players[a].score > gameState.players[b].score ? a : b, Object.keys(gameState.players)[0]);

            document.getElementById('race-container').classList.toggle('hidden', gameState.status !== 'PLAYING');
            document.getElementById('race-lane').innerHTML = Object.values(gameState.players).map(p => {
                const pos = Math.min((p.score / (maxScore + 150)) * 90, 95);
                return `<div class="race-horse" style="left: ${pos}%"><img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${p.avatar}"></div>`;
            }).join('');

            document.getElementById('player-list').innerHTML = Object.entries(gameState.players).sort((a, b) => b[1].score - a[1].score).map(([id, p]) => {
                return `
                <div class="p-6 player-card rounded-2xl border-l-8 ${p.ready ? 'border-green-500' : 'border-zinc-700'} relative mb-4 shadow-xl bg-black/20">
                    <div class="flex items-center gap-6 relative z-10">
                        <div class="relative">
                            <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${p.avatar}" class="w-20 h-20 rounded-full bg-slate-800 border-4 border-white shadow-lg">
                            ${p.ready ? '<div class="absolute -top-2 -right-2 bg-green-500 text-white rounded-full p-1 text-xs">✅</div>' : ''}
                        </div>
                        <div class="flex-grow text-left">
                            <div class="flex justify-between items-center mb-2">
                                <p class="text-3xl font-black uppercase tracking-tighter text-white drop-shadow-md">${p.name} ${id === leaderId && p.score > 0 ? '👑' : ''}</p>
                                <p class="text-3xl font-black text-orange-500 drop-shadow-md">${p.score}</p>
                            </div>
                            <div class="tally-box">
                                ${Array.from({ length: Math.ceil((p.tally || []).length / 5) }).map((_, i) => `
                                    <div class="tally-group">
                                        ${p.tally.slice(i * 5, i * 5 + 5).map(t => `<div class="tally-mark tally-${t}"></div>`).join('')}
                                        ${p.tally.slice(i * 5, i * 5 + 5).length === 5 ? '<div class="tally-cross"></div>' : ''}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('ready-count').innerText = `${Object.values(gameState.players).filter(p => p.ready).length}/${Object.keys(gameState.players).length} BEREIT`;
            if (gameState.status === 'PLAYING') renderArena();
            if (gameState.status === 'RESULTS') renderFinal();
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        async function generateCustomQuestions() {
            const custom = [];
            const geoSources = [
                async () => { // 1. DISTANCE DUEL
                    try {
                        const res = await fetch("https://restcountries.com/v3.1/all?fields=name,capitalInfo,latlng");
                        const data = (await res.json()).filter(c => c.capitalInfo && c.capitalInfo.latlng);
                        const c1 = data[Math.floor(Math.random() * data.length)];
                        const c2 = data[Math.floor(Math.random() * data.length)];
                        const dist = calculateDistance(c1.latlng[0], c1.latlng[1], c2.latlng[0], c2.latlng[1]);
                        return { mode: 'MC', question: `GEOGRAPHIE: Wie viele km Luftlinie liegen zwischen <span class="text-orange-400 font-black">${c1.name.common}</span> und <span class="text-yellow-400 font-black">${c2.name.common}</span>?`, correct_answer: `${dist} km`, incorrect_answers: [`${Math.round(dist * 0.5 + Math.random() * 500)} km`, `${Math.round(dist * 1.5 + Math.random() * 500)} km`, `${Math.round(dist * 0.8 + Math.random() * 200)} km`] };
                    } catch (e) { return null; }
                },
                async () => { // 2. OUTLINE ORACLE
                    try {
                        const res = await fetch("https://restcountries.com/v3.1/all?fields=name,cca2");
                        const data = (await res.json());
                        const target = data[Math.floor(Math.random() * data.length)];
                        return { mode: 'IMG', image: `https://raw.githubusercontent.com/djaiss/mapsicon/master/all/${target.cca2.toLowerCase()}/vector.svg`, question: "OUTLINE ORACLE: Welches Land ist das?", correct_answer: target.name.common, incorrect_answers: [data[Math.floor(Math.random() * data.length)].name.common, data[Math.floor(Math.random() * data.length)].name.common, data[Math.floor(Math.random() * data.length)].name.common] };
                    } catch (e) { return null; }
                },
                async () => { // 3. NEIGHBOR KNOCKOUT
                    try {
                        const res = await fetch("https://restcountries.com/v3.1/all?fields=name,borders");
                        const data = (await res.json()).filter(c => c.borders && c.borders.length > 3);
                        const target = data[Math.floor(Math.random() * data.length)];
                        const neighbors = target.borders;
                        return { mode: 'MC', question: `NEIGHBOR KNOCKOUT: Wie viele Nachbarländer hat <span class="text-orange-400 font-black">${target.name.common}</span>?`, correct_answer: `${neighbors.length}`, incorrect_answers: [`${neighbors.length + 2}`, `${Math.max(1, neighbors.length - 2)}`, `${neighbors.length + 4}`] };
                    } catch (e) { return null; }
                },
                async () => { // 4. SATELLITE CHECK
                    const spots = [
                        { name: "Paris (Eiffelturm)", lat: 48.8584, lon: 2.2945 },
                        { name: "New York (Statue of Liberty)", lat: 40.6892, lon: -74.0445 },
                        { name: "Rom (Kolosseum)", lat: 41.8902, lon: 12.4922 },
                        { name: "Gizeh (Pyramiden)", lat: 29.9792, lon: 31.1342 }
                    ];
                    const spot = spots[Math.floor(Math.random() * spots.length)];
                    const others = spots.filter(s => s.name !== spot.name).map(s => s.name);
                    return { mode: 'IMG', image: `https://static-maps.yandex.ru/1.x/?ll=${spot.lon},${spot.lat}&z=16&l=sat`, question: "SATELLITE CHECK: Welcher Ort ist das?", correct_answer: spot.name, incorrect_answers: others };
                },
                async () => { // 5. URBAN COMPARISON
                    try {
                        const res = await fetch("https://restcountries.com/v3.1/all?fields=name,population");
                        const data = (await res.json()).filter(c => c.population > 1000000);
                        const c1 = data[Math.floor(Math.random() * data.length)];
                        const c2 = data[Math.floor(Math.random() * data.length)];
                        const winner = c1.population > c2.population ? c1 : c2;
                        const loser = c1.population > c2.population ? c2 : c1;
                        return { mode: 'MC', question: `URBAN COMPARISON: Welches Land hat mehr Einwohner?`, correct_answer: winner.name.common, incorrect_answers: [loser.name.common, "Beide gleich", "Keines davon"] };
                    } catch (e) { return null; }
                }
            ];
            for (let source of geoSources) {
                const q = await source();
                if (q) custom.push(q);
            }
            return custom;
        }

        async function initiateQuiz() {
            gameState.questions = []; gameState.isLoading = true; sync(); 
            const count = 10;
            const diff = document.getElementById('cfg-diff').value;
            try {
                // Fetch 5 Trivia questions
                const catsToFetch = selectedCats.includes(9) ? [9] : selectedCats;
                const triviaCount = 5;
                const res = await fetch(`https://opentdb.com/api.php?amount=${triviaCount}${catsToFetch[0] === 9 ? '' : '&category='+catsToFetch[0]}&difficulty=${diff}&type=multiple`);
                const data = await res.json();
                if(data.results) {
                    for (let q of data.results) {
                        gameState.questions.push({ mode: 'MC', question: `WISSENS-CHECK: ${await translateText(q.question)}`, correct_answer: await translateText(q.correct_answer), incorrect_answers: await Promise.all(q.incorrect_answers.map(async a => await translateText(a))) });
                    }
                }
                
                // Fetch 5 Geo questions
                const geoQs = await generateCustomQuestions();
                gameState.questions.push(...geoQs);
                
                // Shuffle and finalize
                gameState.questions.sort(() => Math.random() - 0.5);
                gameState.questions = gameState.questions.slice(0, 10);
                
                gameState.status = 'PLAYING'; gameState.currentIndex = 0; gameState.isLoading = false; resetReadiness(); sync();
            } catch (e) { gameState.isLoading = false; sync(); alert("API Fehler!"); }
        }

        function renderArena() {
            document.getElementById('screen-lobby').classList.add('hidden'); document.getElementById('screen-quiz').classList.remove('hidden');
            const q = gameState.questions[gameState.currentIndex];
            document.getElementById('quiz-progress').innerText = `FRAGE ${gameState.currentIndex + 1} / ${gameState.questions.length}`;
            document.getElementById('question-text').innerHTML = q.question;
            const areas = ['mc-area', 'image-container']; areas.forEach(a => document.getElementById(a)?.classList.add('hidden'));

            if (gameState.showResolution) {
                const res = document.getElementById('resolution'); res.classList.remove('hidden'); const p = gameState.players[myId];
                document.getElementById('personal-feedback').innerHTML = p.lastPoints > 0 ? '<span class="text-green-500 text-4xl font-black">RICHTIG! ✅</span>' : `<span class="text-red-500 text-4xl font-black">DANEBEN! ❌</span>`;
                document.getElementById('correct-text').innerHTML = Array.isArray(q.correct_answer) ? q.correct_answer[0] : q.correct_answer;
                document.getElementById('sauf-text').innerHTML = `<span class="text-3xl">${gameState.saufText}</span>`;
                if (isHost) document.getElementById('host-next').classList.remove('hidden');
            } else {
                document.getElementById('resolution').classList.add('hidden');
                if (q.mode === 'IMG') { document.getElementById('image-container').classList.remove('hidden'); document.getElementById('question-image').src = proxify(q.image); renderMC(q); }
                else { renderMC(q); }
            }
        }

        function renderMC(q) { const mc = document.getElementById('mc-area'); mc.classList.remove('hidden'); if (mc.dataset.rd != gameState.currentIndex) { mc.dataset.rd = gameState.currentIndex; mc.innerHTML = ''; [...(q.incorrect_answers || []), q.correct_answer].sort(() => Math.random() - 0.5).forEach(o => { const b = document.createElement('button'); b.className = "paper-note cursor-pointer"; b.style.setProperty('--rotation', `${Math.random() * 6 - 3}deg`); b.innerHTML = o; b.onclick = () => submitChoice(o); mc.appendChild(b); }); } }
        function triggerEmoji(from, emoji) { const ov = document.getElementById('emoji-display'); document.getElementById('emoji-sender').innerText = "FROM: " + from; document.getElementById('emoji-icon').innerText = emoji; ov.classList.add('opacity-100'); setTimeout(() => ov.classList.remove('opacity-100'), 1500); }
        function sendEmoji(e) { if (isHost) handleData({ type: 'REACTION', from: myName, emoji: e }, { peer: myId }); connections.forEach(c => c.send({ type: 'REACTION', from: myName, emoji: e })); if (!isHost) triggerEmoji(myName, e); }
        function nextRound() { gameState.currentIndex++; if (gameState.currentIndex >= gameState.questions.length) gameState.status = 'RESULTS'; else resetReadiness(); sync(); }
        function resetReadiness() { gameState.showResolution = false; Object.values(gameState.players).forEach(p => { p.ready = false; p.lastChoice = null; p.lastPoints = 0; }); }
        function renderFinal() {
            document.getElementById('screen-quiz').classList.add('hidden'); document.getElementById('screen-results').classList.remove('hidden');
            document.getElementById('podium').innerHTML = Object.values(gameState.players).sort((a, b) => b.score - a.score).map((p, i) => `<div class="flex justify-between chalk-card p-4 rounded-xl mb-2"><span class="text-xl">#${i + 1} ${p.name}</span><span class="text-xl text-yellow-500">${p.score}</span></div>`).join('');
            document.getElementById('summary-table').innerHTML = gameState.history.map((h, i) => `<div class="border-b-2 border-slate-400 pb-4 mb-4 text-left font-black text-xl uppercase text-slate-800">Q${i + 1}: ${h.q}</div>`).join('');
            confetti({ particleCount: 1000, spread: 120, origin: { y: 0.6 } });
        }
        init();
    </script>
