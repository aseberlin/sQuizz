<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JizzQuiz Multiverse - Stable Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Arvo:wght@400;700&family=VT323&family=Outfit:wght@300;400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --pub-wood: #1a0f08;
            --pub-accent: #b45309;
            --pub-paper: #fdf6e3;
        }

        /* --- THEMES --- */
        body.theme-normal {
            background-color: var(--pub-wood);
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
            color: #d1d5db;
            font-family: 'Arvo', serif;
        }

        .theme-normal .chalk-card {
            background: #1e293b;
            border: 4px solid #334155;
            background-image: url('https://www.transparenttextures.com/patterns/black-linen.png');
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.5);
        }

        .theme-normal .paper-note {
            background: #fffef0;
            color: #1a1a1a;
            border: 1px solid #d1d5db;
            clip-path: polygon(1% 2%, 99% 1%, 97% 98%, 2% 96%);
            transform: rotate(var(--rotation));
        }

        .theme-normal .paper-note.active-choice {
            background: #ffec99 !important;
            border: 3px solid #b45309 !important;
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 50;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        body.theme-c64 {
            background-color: #0000aa;
            color: #ffffff;
            font-family: 'VT323', monospace;
            text-transform: uppercase;
        }

        .theme-c64 .chalk-card {
            background: #5555ff;
            border: 10px double #ffffff;
            box-shadow: 15px 15px 0px #000;
        }

        .theme-c64 .paper-note {
            background: #0000aa;
            color: #fff;
            border: 4px solid #fff;
            transform: none !important;
            box-shadow: 8px 8px 0px #000;
            clip-path: none;
            font-size: 1.5rem;
        }

        .theme-c64 .paper-note.active-choice {
            background: #ffffff !important;
            color: #0000aa !important;
            border: 6px solid #000 !important;
            transform: scale(1.1) !important;
        }

        .theme-c64 .turf-track {
            background: #00aa00;
            border: 4px solid #fff;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 48px, #ffffff 50px);
        }

        body.theme-lsd {
            background: #000;
            animation: lsd-pulse 5s infinite linear;
            font-family: 'Permanent Marker', cursive;
        }

        @keyframes lsd-pulse {
            0% {
                background: #f0f;
                filter: hue-rotate(0deg);
            }

            50% {
                background: #0ff;
                filter: hue-rotate(180deg);
            }

            100% {
                background: #f0f;
                filter: hue-rotate(360deg);
            }
        }

        .theme-lsd .paper-note {
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            border: 5px solid #f0f;
            animation: glow-lsd 1s infinite alternate;
            transform: skew(-5deg) !important;
        }

        .theme-lsd .paper-note.active-choice {
            background: #fff !important;
            color: #000 !important;
            box-shadow: 0 0 100px #fff !important;
            transform: scale(1.2) rotate(0deg) !important;
        }

        body.theme-urban {
            background-color: #1a1a1a;
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
        }

        .theme-urban .chalk-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
            border-radius: 0;
        }

        .theme-urban .paper-note {
            background: #262626;
            color: #00f2ff;
            border: 1px solid #00f2ff;
            clip-path: none;
            transform: none !important;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s;
        }

        .theme-urban .paper-note.active-choice {
            background: #00f2ff !important;
            color: #000 !important;
            box-shadow: 0 0 30px #00f2ff !important;
            transform: scale(1.05) !important;
        }

        .theme-urban h1 {
            color: #fefe00;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }

        .theme-urban .turf-track {
            background: #111;
            border: 2px solid #333;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 49px, #444 50px);
        }

        body.theme-solaris {
            background-color: #050505;
            background-image:
                radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
            color: #f1f5f9;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        .theme-solaris .chalk-card {
            background: rgba(15, 10, 25, 0.4);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(212, 175, 55, 0.05);
            border-radius: 24px;
        }

        .theme-solaris .paper-note {
            background: rgba(255, 255, 255, 0.03);
            color: #d4af37;
            border: 1px solid rgba(212, 175, 55, 0.3);
            clip-path: none;
            transform: none !important;
            font-weight: 500;
            text-transform: none;
            letter-spacing: 0.02em;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 12px;
            font-size: 1.1rem;
        }

        .theme-solaris .paper-note.active-choice {
            background: #d4af37 !important;
            color: #000 !important;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4) !important;
            transform: translateY(-5px) !important;
            border-color: #fff !important;
        }

        .theme-solaris h1 {
            color: #d4af37;
            background: linear-gradient(135deg, #fff 0%, #d4af37 50%, #8a6d3b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            letter-spacing: -0.02em;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        .theme-solaris .turf-track {
            background: #0a0a0a;
            border: 1px solid #222;
            background-image:
                linear-gradient(90deg, rgba(212, 175, 55, 0.05) 1px, transparent 1px);
            background-size: 50px 100%;
        }

        .theme-solaris .race-horse img {
            border: 2px solid #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .marker {
            font-family: 'Permanent Marker', cursive;
        }

        .race-horse {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            transition: left 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 20;
        }

        .race-horse img {
            width: 45px;
            height: 45px;
            border: 2px solid white;
            border-radius: 4px;
            background: #000;
        }

        .tally-mark {
            width: 4px;
            height: 16px;
            border-radius: 2px;
            display: inline-block;
            margin-right: 2px;
        }

        .tally-green {
            background: #22c55e;
        }

        .tally-red {
            background: #ef4444;
        }

        .c64-boot {
            position: fixed;
            inset: 0;
            background: #4444ff;
            z-index: 2000;
            padding: 40px;
            font-family: 'VT323', monospace;
            color: #ccccff;
            font-size: 2.5rem;
        }

        .cursor {
            width: 20px;
            height: 30px;
            background: #ccccff;
            display: inline-block;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {

            0%,
            49% {
                opacity: 1;
            }

            50%,
            100% {
                opacity: 0;
            }
        }

        .receipt-paper {
            background: #fff;
            color: #000;
            padding: 40px 20px;
            font-family: monospace;
            box-shadow: 5px 5px 25px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .cat-chip {
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(0, 0, 0, 0.3);
        }

        .cat-chip.selected {
            background: var(--pub-accent);
            border-color: white;
            color: white;
            transform: scale(1.05);
        }

        .animate-throw {
            animation: throwOut 0.8s forwards ease-in;
            pointer-events: none;
        }

        @keyframes throwOut {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translate(600px, -400px) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body class="theme-normal min-h-screen flex flex-col lg:flex-row overflow-x-hidden transition-all duration-700">

    <div id="loading-screen" class="hidden c64-boot">
        <p>**** COMMODORE 64 BASIC V2 ****</p>
        <p>64K RAM SYSTEM 38911 BASIC BYTES FREE</p>
        <br>
        <p>READY.</p>
        <p id="boot-cmd"></p>
        <p id="boot-status"></p>
    </div>

    <div id="emoji-display"
        class="fixed inset-0 bg-black/80 flex flex-col items-center justify-center z-[1500] opacity-0 pointer-events-none transition-opacity duration-300">
        <p id="emoji-sender" class="text-xs text-white mb-2 uppercase font-sans tracking-widest"></p>
        <span id="emoji-icon" class="text-9xl drop-shadow-2xl"></span>
    </div>

    <main class="w-full lg:w-2/3 p-4 lg:p-8 flex flex-col items-center overflow-y-auto min-h-screen">
        <header class="text-center mb-6">
            <h1 class="text-6xl marker text-orange-800 drop-shadow-lg italic">JizzQuiz</h1>
            <p id="room-status" class="text-[9px] uppercase tracking-[0.5em] opacity-40 italic">System V2026.Stable</p>
        </header>

        <div id="race-container" class="w-full max-w-4xl mb-8 hidden">
            <div class="turf-track h-[70px] relative rounded-lg shadow-2xl bg-[#22543d] border-4 border-[#1a3a3a] overflow-hidden"
                style="background-image: repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,255,255,0.15) 50px);">
                <div id="race-lane" class="w-full h-full relative px-10"></div>
            </div>
        </div>

        <div id="screen-lobby" class="w-full max-w-md space-y-6">
            <div class="chalk-card p-8 rounded-xl">
                <input type="text" id="username" placeholder="Name..."
                    class="w-full bg-black/40 p-4 rounded-lg border border-white/10 text-3xl focus:border-orange-800 outline-none text-center font-bold mb-6">
                <div id="avatar-grid" class="flex justify-center flex-wrap gap-2 mb-6"></div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="startHost()"
                        class="bg-orange-800 text-white py-4 rounded-xl font-bold uppercase shadow-lg">Host</button>
                    <button onclick="document.getElementById('join-box').classList.toggle('hidden')"
                        class="bg-zinc-800 py-4 rounded-xl font-bold uppercase">Join</button>
                </div>
                <div id="join-box" class="hidden mt-6 pt-6 border-t border-white/10 space-y-4">
                    <input type="text" id="join-id" placeholder="Code..."
                        class="w-full bg-black/20 p-3 rounded-xl border border-gray-700 text-center font-mono">
                    <button onclick="joinGame()"
                        class="w-full bg-emerald-800 py-3 rounded-xl font-bold uppercase">Connect</button>
                </div>
            </div>

            <div id="host-config" class="hidden chalk-card p-8 rounded-xl text-center">
                <div onclick="copyRoomId()"
                    class="bg-black/20 p-4 rounded-xl mb-6 cursor-pointer border border-white/10 text-white">
                    <span id="display-id" class="text-4xl font-mono font-bold tracking-tighter">...</span>
                </div>

                <div class="mb-6">
                    <p
                        class="text-[10px] uppercase font-bold text-orange-500 mb-3 tracking-widest italic text-left ml-2">
                        Themen-Mix:</p>
                    <div id="category-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <select id="cfg-count" class="bg-black border border-white/10 rounded-lg p-3 text-white">
                        <option value="3">3 FRAGEN</option>
                        <option value="5">5 FRAGEN</option>
                        <option value="10" selected>10 FRAGEN</option>
                    </select>
                    <select id="cfg-diff"
                        class="bg-black border border-white/10 rounded-lg p-3 text-orange-500 font-bold uppercase">
                        <option value="medium">ATZE</option>
                        <option value="hard">LEGENDE</option>
                    </select>
                </div>
                <button onclick="initiateQuiz()"
                    class="bg-orange-800 w-full py-6 rounded-2xl text-3xl font-black uppercase italic shadow-2xl">ZÜNDEN!
                    🍻</button>
            </div>
        </div>

        <div id="screen-quiz" class="hidden w-full max-w-4xl">
            <div id="quiz-progress" class="marker text-orange-600 text-3xl italic mb-6 px-4">...</div>
            <div class="text-center px-4">
                <div id="image-container" class="mb-8 hidden flex justify-center">
                    <img id="question-image" referrerpolicy="no-referrer"
                        class="mx-auto rounded-xl border-4 border-white shadow-2xl max-h-52 bg-white p-2 object-contain"
                        src="">
                </div>
                <h2 id="question-text"
                    class="text-3xl lg:text-5xl font-bold mb-12 text-white leading-tight drop-shadow-lg">...</h2>
                <div id="mc-area" class="grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
                <div id="ghost-area" class="hidden max-w-md mx-auto">
                    <div id="ghost-sequence" class="flex justify-center gap-3 mb-8"></div>
                    <input type="text" id="ghost-input"
                        class="bg-black border-4 border-orange-800 p-6 text-4xl text-center w-full rounded-xl mb-6 uppercase">
                    <button onclick="submitChoice(document.getElementById('ghost-input').value)"
                        class="bg-orange-800 px-10 py-4 rounded-xl font-black uppercase text-xl">Bestätigen</button>
                </div>
            </div>

            <div id="resolution"
                class="hidden mt-10 p-10 chalk-card rounded-[2rem] text-center relative overflow-hidden transition-all">
                <p id="personal-feedback" class="text-2xl font-bold mb-4 uppercase"></p>
                <h3 id="correct-text"
                    class="text-4xl lg:text-6xl font-black text-white mb-8 italic underline decoration-orange-700"></h3>
                <p id="sauf-text" class="text-xl text-yellow-500 font-bold mb-10 italic"></p>
                <button id="host-next" onclick="nextRound()"
                    class="hidden bg-white text-black px-16 py-4 rounded-xl font-black text-xl uppercase shadow-2xl mx-auto block hover:scale-105 transition">Nächste
                    Runde ➔</button>
            </div>
        </div>

        <div id="screen-results" class="hidden w-full max-w-2xl pb-20">
            <h2 class="text-7xl marker text-orange-800 mb-10 text-center italic">ABRECHNUNG!</h2>
            <div id="podium" class="space-y-4 mb-16"></div>
            <div class="receipt-paper">
                <h3 class="text-xl font-bold mb-6 text-center border-b-2 border-black pb-2 uppercase">SÜNDENREGISTER
                </h3>
                <div id="summary-table" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <aside class="w-full lg:w-1/3 bg-black/40 p-6 flex flex-col border-t lg:border-t-0 lg:border-l border-white/5">
        <div class="mb-8 p-4 chalk-card rounded-xl">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setTheme('theme-solaris')"
                    class="bg-zinc-900 py-2 rounded text-[10px] font-bold uppercase border border-amber-500 text-amber-500 col-span-2">Solaris</button>
                <button onclick="setTheme('theme-urban')"
                    class="bg-zinc-700 py-2 rounded text-[10px] font-bold uppercase border border-cyan-400">Urban</button>
                <button onclick="setTheme('theme-normal')"
                    class="bg-zinc-800 py-2 rounded text-[10px] font-bold uppercase">Pub</button>
                <button onclick="setTheme('theme-c64')"
                    class="bg-blue-800 py-2 rounded text-[10px] font-bold uppercase">C64</button>
                <button onclick="setTheme('theme-lsd')"
                    class="bg-gradient-to-r from-purple-500 to-pink-500 py-2 rounded text-[10px] font-bold uppercase">LSD</button>
            </div>
        </div>
        <h3 class="text-lg font-black uppercase text-orange-800 mb-2 text-center tracking-widest italic">Stammtisch</h3>
        <p id="ready-count" class="text-center text-[10px] opacity-40 mb-6 font-mono tracking-widest">0/0 BEREIT</p>
        <div id="player-list" class="flex-grow space-y-4 overflow-y-auto pr-2 custom-scrollbar"></div>
        <div class="mt-6 pt-6 border-t border-white/10 grid grid-cols-5 gap-2">
            <button onclick="sendEmoji('🍻')" class="text-2xl hover:scale-125 transition">🍻</button>
            <button onclick="sendEmoji('🥃')" class="text-2xl hover:scale-125 transition">🥃</button>
            <button onclick="sendEmoji('⚽')" class="text-2xl hover:scale-125 transition">⚽</button>
            <button onclick="sendEmoji('🤮')" class="text-2xl hover:scale-125 transition">🤮</button>
            <button onclick="sendEmoji('🤡')" class="text-2xl hover:scale-125 transition">🤡</button>
            <button onclick="sendEmoji('🔥')" class="text-2xl hover:scale-125 transition">🔥</button>
            <button onclick="sendEmoji('🚬')" class="text-2xl hover:scale-125 transition">🚬</button>
            <button onclick="sendEmoji('💩')" class="text-2xl hover:scale-125 transition">💩</button>
            <button onclick="sendEmoji('🏆')" class="text-2xl hover:scale-125 transition">🏆</button>
            <button onclick="sendEmoji('🥨')" class="text-2xl hover:scale-125 transition">🥨</button>
        </div>
    </aside>

    <script>
        let peer, myId, myName, myAvatarIdx = 0, connections = [], isHost = false;
        let gameState = { players: {}, questions: [], currentIndex: 0, status: 'LOBBY', showResolution: false, history: [], isLoading: false };

        const TRIVIA_CATS = [
            { id: 9, name: "Gemischt" }, { id: 11, name: "Film" }, { id: 12, name: "Musik" },
            { id: 15, name: "Games" }, { id: 17, name: "Natur" }, { id: 18, name: "Computer" },
            { id: 21, name: "Sport" }, { id: 23, name: "Historie" }, { id: 24, name: "Politik" }, { id: 26, name: "Promis" }
        ];
        let selectedCats = [9];

        function setTheme(theme) { document.body.className = theme + ' min-h-screen flex flex-col lg:flex-row overflow-x-hidden transition-all duration-700'; localStorage.setItem('jizzquiz_theme', theme); }
        setTheme(localStorage.getItem('jizzquiz_theme') || 'theme-solaris');

        function proxify(url) { return url ? `https://images.weserv.nl/?url=${encodeURIComponent(url.replace(/^https?:\/\//, ''))}&w=500&output=png` : ''; }

        async function translateText(text) {
            if (!text) return "";
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=de&dt=t&q=${encodeURIComponent(text)}`);
                const data = await res.json(); return data[0][0][0];
            } catch (e) { return text; }
        }

        async function generateCustomQuestions() {
            const custom = [];
            const sources = [
                async () => { // 1. MATH
                    const a = Math.floor(Math.random() * 12) + 2;
                    const b = Math.floor(Math.random() * 15) + 5;
                    const c = Math.floor(Math.random() * 10) + 2;
                    let qText, answer;
                    if (Math.random() > 0.5) { qText = `${a} * (${b} + ${c})`; answer = a * (b + c); }
                    else { qText = `(${a} + ${b}) * ${c}`; answer = (a + b) * c; }
                    return { mode: 'INPUT', question: `MATHE: Was ergibt ${qText}?`, correct_answer: answer.toString() };
                },
                async () => { // 2. JOKE (icanhazdadjoke)
                    try {
                        const res = await fetch("https://icanhazdadjoke.com/", { headers: { "Accept": "application/json" } });
                        const data = await res.json();
                        const joke = data.joke.split('?');
                        if (joke.length < 2) throw "bad joke format";
                        return { mode: 'INPUT', question: `WITZE-ECKE: Ergänze die Pointe:<br><span class="italic text-amber-400">"${joke[0]}?"</span>`, correct_answer: joke[1].trim() };
                    } catch (e) { return sources[0](); } // Fallback to math
                },
                async () => { // 3. FLAGS (Rest Countries)
                    try {
                        const res = await fetch("https://restcountries.com/v3.1/all?fields=name,flags");
                        const data = await res.json();
                        const country = data[Math.floor(Math.random() * data.length)];
                        return { mode: 'IMG', image: country.flags.png, question: "WELCHES LAND GEHÖRT ZU DIESER FLAGGE?", correct_answer: country.name.common };
                    } catch (e) { return sources[0](); }
                },
                async () => { // 4. POKEMON (PokeAPI)
                    try {
                        const id = Math.floor(Math.random() * 151) + 1;
                        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                        const data = await res.json();
                        return { mode: 'IMG', image: data.sprites.front_default, question: "POKEMON-RADAR: Wer ist das?", correct_answer: data.name };
                    } catch (e) { return sources[0](); }
                },
                async () => { // 5. RICK & MORTY
                    try {
                        const id = Math.floor(Math.random() * 500) + 1;
                        const res = await fetch(`https://rickandmortyapi.com/api/character/${id}`);
                        const data = await res.json();
                        return { mode: 'MC', question: `ZUSTANDSPRÜFUNG: Ist <span class="text-green-400">${data.name}</span> in der Serie Rick & Morty aktuell...?`, correct_answer: data.status, incorrect_answers: ["Ganz woanders", "In einer Dose", "Vergessen"] };
                    } catch (e) { return sources[0](); }
                },
                async () => { // 6. NUMBERS (NumbersAPI)
                    try {
                        const id = Math.floor(Math.random() * 2000);
                        const res = await fetch(`http://numbersapi.com/${id}/year?json`);
                        const data = await res.json();
                        return { mode: 'INPUT', question: `GESCHICHTS-CHECK: Was geschah im Jahr ${id}?<br><span class="text-[14px] leading-tight">${await translateText(data.text)}</span>`, correct_answer: id.toString() };
                    } catch (e) { return sources[0](); }
                },
                async () => { // 7. URBAN SCRAMBLE
                    const urbanWords = ["SKYLINE", "PENTHOUSE", "BETON", "WOLKENKRATZER", "METROPOLE", "STRASSENKUNST"];
                    const word = urbanWords[Math.floor(Math.random() * urbanWords.length)];
                    const scrambled = word.split('').sort(() => Math.random() - 0.5).join(' ');
                    return { mode: 'INPUT', question: `STADT-RÄTSEL: Baue das Wort zusammen:<br><span class="text-amber-500 font-black tracking-widest">${scrambled}</span>`, correct_answer: word };
                }
            ];

            // Shuffle and pick 7 unique sources (or repeat if needed)
            const shuffled = sources.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 7; i++) {
                custom.push(await (shuffled[i] || sources[0])());
            }
            return custom;
        }

        // UI INIT
        const AVATAR_SEEDS = ['Abe', 'Buster', 'Clyde', 'Zack', 'Fritz', 'Hulk', 'Bier', 'Pferd'];
        const avatarGrid = document.getElementById('avatar-grid');
        AVATAR_SEEDS.forEach((seed, idx) => {
            const img = document.createElement('img'); img.src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${seed}`;
            img.className = `avatar-option p-1 bg-white/5 w-[40px] cursor-pointer rounded ${idx === 0 ? 'selected' : ''}`;
            img.onclick = () => { document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected')); img.classList.add('selected'); myAvatarIdx = idx; };
            avatarGrid.appendChild(img);
        });

        const catGrid = document.getElementById('category-grid');
        TRIVIA_CATS.forEach(cat => {
            const chip = document.createElement('div'); chip.className = `cat-chip ${cat.id === 9 ? 'selected' : ''}`;
            chip.innerText = cat.name;
            chip.onclick = () => {
                if (cat.id === 9) { selectedCats = [9]; document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected')); chip.classList.add('selected'); return; }
                const idx = selectedCats.indexOf(cat.id);
                if (idx > -1) { selectedCats.splice(idx, 1); chip.classList.remove('selected'); }
                else { selectedCats.push(cat.id); chip.classList.add('selected'); document.querySelector('.cat-chip').classList.remove('selected'); const gIdx = selectedCats.indexOf(9); if (gIdx > -1) selectedCats.splice(gIdx, 1); }
                if (selectedCats.length === 0) { selectedCats = [9]; document.querySelector('.cat-chip').classList.add('selected'); }
            };
            catGrid.appendChild(chip);
        });

        const FOOTBALL_POOL = [
            { mode: 'IMG', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/FC_Bayern_M%C3%BCnchen_logo_%282017%29.svg/512px-FC_Bayern_M%C3%BCnchen_logo_%282017%29.svg.png', question: "WELCHER KLUB?", correct_answer: "FC Bayern München", incorrect_answers: ["Augsburg", "Mainz", "Bochum"] },
            { mode: 'IMG', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Borussia_Dortmund_logo.svg/512px-Borussia_Dortmund_logo.svg.png', question: "WELCHER KLUB?", correct_answer: "Borussia Dortmund", incorrect_answers: ["Schalke", "Bochum", "Essen"] }
        ];

        function init() {
            peer = new Peer();
            peer.on('open', id => { myId = id; document.getElementById('display-id').innerText = id; });
            peer.on('connection', c => { c.on('open', () => { connections.push(c); c.on('data', d => handleData(d, c)); }); });
        }

        function startHost() {
            myName = document.getElementById('username').value.trim() || "Host"; isHost = true;
            document.getElementById('host-config').classList.remove('hidden');
            gameState.players[myId] = { name: myName, avatar: AVATAR_SEEDS[myAvatarIdx], score: 0, lastPoints: 0, ready: false, tally: [] }; sync();
        }

        function joinGame() {
            myName = document.getElementById('username').value.trim() || "Gast";
            const hId = document.getElementById('join-id').value.trim(); const c = peer.connect(hId);
            c.on('open', () => { connections.push(c); c.send({ type: 'JOIN', name: myName, avatar: AVATAR_SEEDS[myAvatarIdx] }); });
            c.on('data', handleData);
        }

        function handleData(data, conn) {
            if (data.type === 'JOIN') { gameState.players[conn.peer] = { name: data.name, avatar: data.avatar, score: 0, lastPoints: 0, ready: false, tally: [] }; sync(); }
            if (data.type === 'SYNC') { gameState = data.state; updateUI(); }
            if (data.type === 'SUBMIT') { const p = gameState.players[conn.peer]; p.ready = true; p.lastChoice = data.choice; checkAllReady(); }
            if (data.type === 'REACTION') triggerEmoji(data.from, data.emoji);
            if (data.type === 'BOOT_START') runGlobalBootSequence();
        }

        function checkAllReady() {
            if (!isHost) return;
            const all = Object.values(gameState.players);
            if (all.every(p => p.ready)) {
                const q = gameState.questions[gameState.currentIndex];
                let roundsCorrect = 0;
                all.forEach(p => {
                    const pInput = (p.lastChoice || "").toString().trim().toUpperCase();
                    const isCorrect = pInput === q.correct_answer.toUpperCase();
                    p.lastPoints = isCorrect ? 100 : 0; p.score += p.lastPoints;
                    p.tally.push(isCorrect ? 'green' : 'red');
                    if (isCorrect) roundsCorrect++;
                });
                gameState.saufText = roundsCorrect === 0 ? "TOTALAUSFALL! Alle bechern!" : (roundsCorrect === 1 ? "STREBER! Rest trinkt!" : "Puh, Safe.");
                gameState.history.push({ q: q.question, ans: q.correct_answer, players: JSON.parse(JSON.stringify(gameState.players)) });
                gameState.showResolution = true;
            }
            sync();
        }

        function submitChoice(val) {
            if (isHost) handleData({ type: 'SUBMIT', choice: val }, { peer: myId });
            else connections[0].send({ type: 'SUBMIT', choice: val });
            const all = document.querySelectorAll('.paper-note');
            all.forEach(b => { b.disabled = true; if (b.innerHTML === val) b.classList.add('active-choice'); else { b.style.opacity = "0.3"; b.style.filter = "grayscale(100%)"; } });
        }

        function sync() { if (!isHost) return; updateUI(); connections.forEach(c => c.send({ type: 'SYNC', state: gameState })); }

        function updateUI() {
            document.getElementById('loading-screen').classList.toggle('hidden', !gameState.isLoading);
            const maxScore = Math.max(...Object.values(gameState.players).map(p => p.score), 1);
            const leaderId = Object.keys(gameState.players).reduce((a, b) => gameState.players[a].score > gameState.players[b].score ? a : b, Object.keys(gameState.players)[0]);

            document.getElementById('race-container').classList.toggle('hidden', gameState.status !== 'PLAYING');
            document.getElementById('race-lane').innerHTML = Object.values(gameState.players).map(p => {
                const pos = Math.min((p.score / (maxScore + 150)) * 90, 95);
                return `<div class="race-horse" style="left: ${pos}%"><img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${p.avatar}"></div>`;
            }).join('');

            document.getElementById('player-list').innerHTML = Object.entries(gameState.players).sort((a, b) => b[1].score - a[1].score).map(([id, p]) => `
            <div class="p-4 chalk-card rounded-xl border-l-8 ${p.ready ? 'border-green-500' : 'border-zinc-700'} relative">
                <div class="flex items-center gap-4 relative z-10">
                    <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${p.avatar}" class="w-10 h-10 rounded bg-black">
                    <div class="flex-grow">
                        <p class="text-[10px] font-black uppercase">${p.name} ${id === leaderId && p.score > 0 ? '👓' : ''}</p>
                        <p class="text-xl font-black text-orange-600">${p.score}</p>
                        <div class="flex flex-wrap gap-1 mt-1">${(p.tally || []).map(t => `<div class="tally-mark tally-${t}"></div>`).join('')}</div>
                    </div>
                </div>
            </div>`).join('');

            document.getElementById('ready-count').innerText = `${Object.values(gameState.players).filter(p => p.ready).length}/${Object.keys(gameState.players).length} BEREIT`;
            if (gameState.status === 'PLAYING') renderArena();
            if (gameState.status === 'RESULTS') renderFinal();
        }

        async function initiateQuiz() {
            connections.forEach(c => c.send({ type: 'BOOT_START' })); await runGlobalBootSequence();
            gameState.isLoading = true; sync(); await typeBoot();
            const count = parseInt(document.getElementById('cfg-count').value);
            const diff = document.getElementById('cfg-diff').value;
            const targetCat = selectedCats[Math.floor(Math.random() * selectedCats.length)];
            const catUrl = targetCat === 9 ? '' : `&category=${targetCat}`;

            try {
                const res = await fetch(`https://opentdb.com/api.php?amount=3${catUrl}&difficulty=${diff}&type=multiple`);
                const data = await res.json();
                gameState.questions = [];
                for (let q of data.results) {
                    gameState.questions.push({
                        mode: 'MC', question: await translateText(q.question),
                        correct_answer: await translateText(q.correct_answer),
                        incorrect_answers: await Promise.all(q.incorrect_answers.map(async a => await translateText(a)))
                    });
                }
                gameState.questions.push(...await generateCustomQuestions());
                gameState.status = 'PLAYING'; gameState.currentIndex = 0; gameState.isLoading = false; resetReadiness(); sync();
            } catch (e) { gameState.isLoading = false; sync(); alert("API Fehler! Bitte Seite neu laden."); }
        }

        async function typeBoot() {
            const cmd = document.getElementById('boot-cmd'); const status = document.getElementById('boot-status'); const text = 'LOAD "JizzQuiz", 8, 1';
            cmd.innerHTML = ''; for (let char of text) { cmd.innerHTML += char; await new Promise(r => setTimeout(r, 5)); }
            cmd.innerHTML += '<span class="cursor"></span>'; await new Promise(r => setTimeout(r, 50));
            status.innerHTML = 'SEARCHING FOR JizzQuiz<br>LOADING<br>READY.<br>RUN<span class="cursor"></span>';
            await new Promise(r => setTimeout(r, 100));
        }

        async function runGlobalBootSequence() {
            const screen = document.getElementById('loading-screen'); screen.classList.remove('hidden');
            document.getElementById('boot-cmd').innerHTML = ''; document.getElementById('boot-status').innerHTML = '';
        }

        function renderArena() {
            document.getElementById('screen-lobby').classList.add('hidden'); document.getElementById('screen-quiz').classList.remove('hidden');
            const q = gameState.questions[gameState.currentIndex];
            document.getElementById('quiz-progress').innerText = `FRAGE ${gameState.currentIndex + 1} / ${gameState.questions.length}`;
            document.getElementById('question-text').innerHTML = q.question;
            const areas = ['mc-area', 'image-container', 'ghost-area']; areas.forEach(a => document.getElementById(a).classList.add('hidden'));

            if (gameState.showResolution) {
                const res = document.getElementById('resolution'); res.classList.remove('hidden'); const p = gameState.players[myId];
                document.getElementById('personal-feedback').innerHTML = p.lastPoints > 0 ? '<span class="text-green-500">RICHTIG! ✅</span>' : `<span class="text-red-500">DANEBEN! ("${p.lastChoice || 'Nix'}") ❌</span>`;
                document.getElementById('correct-text').innerHTML = (q.mode === 'GHOST') ? q.correct_answer.split('').reverse().join('') : q.correct_answer;
                document.getElementById('sauf-text').innerText = gameState.saufText;
                if (isHost) document.getElementById('host-next').classList.remove('hidden');
                if (p.lastPoints === 0) document.querySelector('.active-choice')?.classList.add('animate-throw');
            } else {
                document.getElementById('resolution').classList.add('hidden');
                if (q.mode === 'IMG') { document.getElementById('image-container').classList.remove('hidden'); document.getElementById('question-image').src = proxify(q.image); renderMC(q); }
                else if (q.mode === 'INPUT') { document.getElementById('ghost-area').classList.remove('hidden'); renderInput(q); }
                else { renderMC(q); }
            }
        }

        function renderMC(q) {
            const mc = document.getElementById('mc-area'); mc.classList.remove('hidden');
            if (mc.dataset.rd != gameState.currentIndex) {
                mc.dataset.rd = gameState.currentIndex; mc.innerHTML = '';
                [...(q.incorrect_answers || []), q.correct_answer].sort(() => Math.random() - 0.5).forEach(o => {
                    const b = document.createElement('button'); b.className = "paper-note cursor-pointer";
                    b.style.setProperty('--rotation', `${Math.random() * 6 - 3}deg`); b.innerHTML = o; b.onclick = () => submitChoice(o); mc.appendChild(b);
                });
            }
        }

        function renderInput(q) {
            const gs = document.getElementById('ghost-sequence');
            gs.innerHTML = '';
            document.getElementById('ghost-input').value = '';
        }

        function triggerEmoji(from, emoji) {
            const ov = document.getElementById('emoji-display'); document.getElementById('emoji-sender').innerText = "FROM: " + from; document.getElementById('emoji-icon').innerText = emoji;
            ov.classList.add('opacity-100'); setTimeout(() => ov.classList.remove('opacity-100'), 1500);
        }

        function sendEmoji(e) { if (isHost) handleData({ type: 'REACTION', from: myName, emoji: e }, { peer: myId }); connections.forEach(c => c.send({ type: 'REACTION', from: myName, emoji: e })); if (!isHost) triggerEmoji(myName, e); }
        function nextRound() { gameState.currentIndex++; if (gameState.currentIndex >= gameState.questions.length) gameState.status = 'RESULTS'; else resetReadiness(); sync(); }
        function resetReadiness() { gameState.showResolution = false; Object.values(gameState.players).forEach(p => { p.ready = false; p.lastChoice = null; p.lastPoints = 0; }); }

        function renderFinal() {
            document.getElementById('screen-quiz').classList.add('hidden'); document.getElementById('screen-results').classList.remove('hidden');
            document.getElementById('podium').innerHTML = Object.values(gameState.players).sort((a, b) => b.score - a.score).map((p, i) => `
            <div class="flex justify-between chalk-card p-4 rounded-xl mb-2"><span class="text-xl">#${i + 1} ${p.name}</span><span class="text-xl text-yellow-500">${p.score}</span></div>`).join('');
            document.getElementById('summary-table').innerHTML = gameState.history.map((h, i) => `
            <div class="border-b border-gray-300 pb-2 mb-2 text-left"><p class="font-bold text-[9px] uppercase">Q${i + 1}: ${h.q}</p><div class="flex flex-wrap gap-2 mt-1">
                ${Object.values(h.players).map(p => { const isCorrect = p.lastPoints > 0; return `<span class="text-[8px] px-1 rounded border ${isCorrect ? 'bg-green-100 text-green-800 border-green-300' : 'bg-red-100 text-red-800 border-red-300'}">${p.name}: ${p.lastChoice || '-'}</span>`; }).join('')}
            </div></div>`).join('');
            confetti({ particleCount: 1000, spread: 120, origin: { y: 0.6 } });
        }

        init();
    </script>
</body>

</html>
